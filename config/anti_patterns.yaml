  titles:
    - Marketing Manager
    - HR Manager
    - Sales Manager
    - Customer Support
    - Operations Manager
    - Accountant
    - Content Writer
    - Brand Manager
    - Community Manager
    - Product Marketing Manager
  retrieval_evidence_threshold: 0.20
  ceiling: rank_50

