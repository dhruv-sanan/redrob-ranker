# Anti-pattern archetypes per problem.md §1.9. Each archetype maps to a score ceiling
# applied AFTER the linear blend (Phase 4). Ceilings: "rank_50" (cannot enter top 50)
# and "rank_100" (cannot enter top 100). No ceiling = "none".

