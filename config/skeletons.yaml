# Reasoning skeletons partitioned by rank band.
# Variables: {positive}, {skill}, {logistics}, {concern}, {employer}, {tier},
# {must_haves}, {exception}. Missing variables expand to empty when the
# evidence ledger reports None for that fact.

top10:
  - "Production retrieval ownership: {positive}. Backed by {skill}. {logistics}. {concern}"
  - "Direct fit — {positive}. Skill depth from {skill}. {logistics}. {concern}"
  - "Shipped recsys at {employer}: {positive}. {skill}. {logistics}. {concern}"
  - "Senior IC profile — {positive}. {skill} + {must_haves}. {logistics}. {concern}"
  - "Tier-A: {positive}. Validated by {skill}. {logistics}. {concern}"

top25:
  - "Strong must-have evidence: {positive}. {skill}. {logistics}. {concern}"
  - "Adjacent senior fit — {positive}. {skill}. {logistics}. {concern}"
  - "{employer} role aligns: {positive}. {skill}. {logistics}. {concern}"
  - "Solid retrieval/ranking depth — {positive}. {skill}. {logistics}. {concern}"
  - "Production ML at {employer}: {positive}. {skill}. {logistics}. {concern}"

top50:
