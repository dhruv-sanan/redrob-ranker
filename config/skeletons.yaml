  - "Backend/data background; {positive}. {skill}. However, {concern}. {logistics}"
  - "Strong fundamentals — {positive}. Missing direct ranking-eval evidence. {logistics}. {concern}"
  - "Adjacent to JD intent: {positive}. {skill}. {logistics}. {concern}"
  - "Closely related work at {employer}: {positive}. Gap on {must_haves}. {logistics}. {concern}"

top100:
  - "Stretch fit — {positive}. Gaps: {concern}. {logistics}"
  - "Partial match: {positive}. {skill}. However, {concern}. {logistics}"
  - "{exception} — {positive}. {concern}. {logistics}"
  - "Skills-list-only signal: {skill}. {concern}. {logistics}"
  - "Outside the strict band — {positive}. {concern}. {logistics}"
